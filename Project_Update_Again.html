<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bread Gacha</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fffbe6;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 0 auto;
    }

    .wheel {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 5px solid #a0522d;
        position: relative;
        overflow: hidden;
        transform: rotate(0deg);
        transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .slice {
      position: absolute;
      width: 50%;
      height: 50%;
      transform-origin: 100% 100%;
      clip-path: polygon(0 1, 100% 0, 100% 100%);
    }

    .center-arrow {
      position: absolute;
      top: 15%;
      left: 50%;
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 30px solid red;
      transform: translate(-37%, -140%) rotate(180deg);
      z-index: 2;
    }

    button {
      margin-top: 30px;
      padding: 12px 24px;
      font-size: 18px;
      background: #f4a460;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .layout {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        flex-wrap: wrap; /* ensures responsiveness */
    }


    .result {
      margin-top: 30px;
      font-size: 22px;
      color: #6b4c3b;
    }

    .legend {
    /* margin-top: 40px; */
    text-align: left;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
    background: #fff8dc;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #deb887;
    }

    .legend ul {
    list-style: none;
    padding: 0;
    margin: 0;
    }

    .legend li {
    margin: 6px 0;
    font-size: 16px;
    display: flex;
    align-items: center;
    }

    .color-box {
    display: inline-block;
    width: 18px;
    height: 18px;
    margin-right: 10px;
    border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <h1>🎡 Bread Gacha</h1>

  <div class="layout">
    <div class="legend">
      <h3>Bread Types:</h3>
      <ul>
        <li><span class="color-box" style="background:#f4e04d"></span> Donut</li>
        <li><span class="color-box" style="background:#f4a261"></span> Bagel</li>
        <li><span class="color-box" style="background:#e76f51"></span> Croissant</li>
        <li><span class="color-box" style="background:#a8dadc"></span> Sandwich</li>
        <li><span class="color-box" style="background:#457b9d"></span> Whole Wheat</li>
        <li><span class="color-box" style="background:#2a9d8f"></span> Pizza</li>
        <li><span class="color-box" style="background:#e9c46a"></span> White Bread</li>
        <li><span class="color-box" style="background:#ffafcc"></span> Toast</li>
      </ul>
      <p><strong>🎲 Each bread type has a 12.5% chance of being selected.</strong></p>
    </div>

    <div class="wheel-container">
      <div class="center-arrow"></div>
      <div class="wheel" id="wheel"></div>
      <button onclick="spin()">Spin!</button>
    </div>
  </div>


  <div class="result" id="result"></div>

  <script>
    const breads = [
      { name: "Donut", color: "#f4e04d" },
      { name: "Bagel", color: "#f4a261" },
      { name: "Croissant", color: "#e76f51" },
      { name: "Sandwich", color: "#a8dadc" },
      { name: "Whole Wheat", color: "#457b9d" },
      { name: "Pizza", color: "#2a9d8f" },
      { name: "White Bread", color: "#e9c46a" },
      { name: "Toast", color: "#ffafcc" }
    ];

    const wheel = document.getElementById("wheel");
    const result = document.getElementById("result");

    const sliceAngle = 360 / breads.length;

    // Create the colored slices
    breads.forEach((bread, i) => {
      const slice = document.createElement("div");
      slice.className = "slice";
      slice.style.backgroundColor = bread.color;
      slice.style.transform = `rotate(${i * sliceAngle}deg) skewY(${90 - sliceAngle}deg)`;
      wheel.appendChild(slice);
    });

    let spinning = false;
    let currentRotation = 0; // Track the total rotation
    
    function spin() {
        if (spinning) return;
        spinning = true;
        result.textContent = "";

        const spins = 10; // Full spins
        const randomExtraAngle = Math.floor(Math.random() * 360);
        const totalRotation = (360 * spins) + randomExtraAngle;
        currentRotation += totalRotation;

        // Apply rotation
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            // Normalize rotation within 0-360
            const normalizedRotation = currentRotation % 360;
            // Determine which slice the arrow points to (at top center, 0 degrees)
            const angleFromTop = (360 - normalizedRotation + sliceAngle / 2) % 360;
            const index = Math.floor(angleFromTop / sliceAngle);

            result.textContent = `You got: ${breads[index].name}!`;
            spinning = false;
        }, 4000);
    }
  </script>

</body>
</html>
